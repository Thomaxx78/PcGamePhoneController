<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foot — Écran de jeu</title>
  <style>
    :root {
      --bg: #0a0f0d;
      --turf-a: #0b3d2e;
      --turf-b: #0d4634;
      --line: rgba(234, 255, 244, 0.55);
      --team-a: #38bdf8;   /* Azur */
      --team-b: #fb7237;   /* Mandarine */
      --amber: #ffd23f;    /* scoreboard */
      --ink: #eafff4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: "Arial Narrow", "Roboto Condensed", system-ui, sans-serif;
      overflow: hidden;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 18px;
    }

    /* --- Scoreboard --- */
    .scoreboard {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 28px;
      background: #06100c;
      border: 1px solid rgba(255, 210, 63, 0.25);
      border-radius: 14px;
      padding: 10px 28px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 10px 30px rgba(0,0,0,0.5);
    }
    .team-name {
      font-weight: 700;
      letter-spacing: 0.28em;
      font-size: 22px;
      text-transform: uppercase;
    }
    .team-name.a { color: var(--team-a); text-align: right; }
    .team-name.b { color: var(--team-b); text-align: left; }
    .score {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 46px;
      letter-spacing: 0.06em;
      color: var(--amber);
      text-shadow: 0 0 18px rgba(255, 210, 63, 0.35);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .score .dash { opacity: 0.45; }

    /* --- Terrain --- */
    .pitch-frame {
      position: relative;
      flex: 1;
      width: 100%;
      max-width: 1100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      width: 100%;
      height: auto;
      max-height: 100%;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.55);
    }

    /* --- Bandeau du bas --- */
    .footer {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(234,255,244,0.55);
    }
    .pill {
      border: 1px solid rgba(234,255,244,0.18);
      border-radius: 999px;
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .pill:hover { color: var(--ink); border-color: rgba(234,255,244,0.4); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #f87171; display: inline-block; margin-right: 8px; vertical-align: middle; }
    .dot.on { background: #4ade80; }

    /* --- Modale de connexion --- */
    .modal {
      position: fixed; inset: 0;
      background: rgba(4, 8, 6, 0.82);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .modal.hidden { display: none; }
    .card {
      background: #0b1512;
      border: 1px solid rgba(255, 210, 63, 0.22);
      border-radius: 18px;
      padding: 34px 40px;
      text-align: center;
      max-width: 460px;
    }
    .card h1 {
      font-size: 30px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .card p { color: rgba(234,255,244,0.6); font-size: 15px; letter-spacing: 0.04em; line-height: 1.5; }
    .qr {
      margin: 22px auto 10px;
      width: 240px; height: 240px;
      background: #fff; border-radius: 14px; padding: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .qr img { width: 100%; height: 100%; border-radius: 6px; }
    .url {
      font-family: ui-monospace, monospace;
      color: var(--amber); font-size: 15px;
      background: rgba(255,210,63,0.08);
      border-radius: 8px; padding: 8px 12px; margin-top: 8px;
      word-break: break-all;
    }
    .close-hint { margin-top: 16px; font-size: 12px; color: rgba(234,255,244,0.4); letter-spacing: 0.12em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="scoreboard">
      <div class="team-name a">Azur</div>
      <div class="score"><span id="scoreA">0</span><span class="dash">–</span><span id="scoreB">0</span></div>
      <div class="team-name b">Mandarine</div>
    </div>

    <div class="pitch-frame">
      <canvas id="pitch" width="900" height="600"></canvas>
    </div>

    <div class="footer">
      <span><span id="statusDot" class="dot"></span><span id="statusText">Serveur…</span></span>
      <span class="pill" id="joinPill">Ajouter une manette</span>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="card">
      <h1>Branche ta manette</h1>
      <p>Scanne ce QR code avec ton téléphone (même WiFi que cet ordi) pour devenir un joueur.</p>
      <div class="qr"><img id="qrImg" alt="QR code de la manette" /></div>
      <div class="url" id="urlText">…</div>
      <div class="close-hint">La partie démarre dès qu'un joueur rejoint</div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/game.js"></script>
</body>
</html>
