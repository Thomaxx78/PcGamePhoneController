<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeux — Écran</title>
  <style>
    :root {
      --bg:     #0a0f0d;
      --team-a: #38bdf8;
      --team-b: #fb7237;
      --amber:  #ffd23f;
      --ink:    #eafff4;
      --dim:    rgba(234,255,244,0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--ink);
      font-family: "Arial Narrow", "Roboto Condensed", system-ui, sans-serif; overflow: hidden; }

    /* ── Écrans ── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; gap: 20px;
    }
    .screen.hidden { display: none; }

    /* ── LOBBY ── */
    #screen-lobby { background: var(--bg); }
    .lobby-card {
      background: #0b1512;
      border: 1px solid rgba(255,210,63,.22);
      border-radius: 18px; padding: 36px 44px;
      text-align: center; max-width: 440px; width: 100%;
    }
    .lobby-card h1 { font-size: 28px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; margin-bottom: 8px; }
    .lobby-card p { color: var(--dim); font-size: 15px; line-height: 1.5; }
    .qr-box { margin: 22px auto 10px; width: 240px; height: 240px;
      background: #fff; border-radius: 14px; padding: 10px;
      display: flex; align-items: center; justify-content: center; }
    .qr-box img { width: 100%; border-radius: 6px; }
    .ctrl-url { font-family: ui-monospace, monospace; color: var(--amber); font-size: 14px;
      background: rgba(255,210,63,.08); border-radius: 8px; padding: 8px 12px;
      margin-top: 8px; word-break: break-all; }

    /* ── MENU ── */
    #screen-menu { flex-direction: row; align-items: stretch; padding: 0; }
    .menu-sidebar {
      width: 260px; background: #06100c;
      border-right: 1px solid rgba(255,210,63,.12);
      padding: 28px 20px; display: flex; flex-direction: column; gap: 12px;
      overflow-y: auto;
    }
    .menu-sidebar h3 { font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 4px; }
    .player-pill {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,.04); border-radius: 10px; padding: 8px 12px;
      font-size: 15px;
    }
    .player-dot { width: 10px; height: 10px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
    .menu-main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 32px; padding: 40px;
    }
    .menu-main h2 { font-size: 32px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; }
    .games-list { list-style: none; display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 400px; }
    .game-item {
      padding: 20px 28px; border-radius: 14px;
      border: 2px solid rgba(255,255,255,.1);
      font-size: 22px; font-weight: 700; letter-spacing: .05em;
      transition: border-color .15s, background .15s;
    }
    .game-item.selected {
      border-color: var(--amber); background: rgba(255,210,63,.08);
      color: var(--amber);
    }
    .menu-hint { color: var(--dim); font-size: 13px; letter-spacing: .1em; text-transform: uppercase; }

    /* ── TEAM SELECT ── */
    #screen-team { gap: 0; }
    .team-header { font-size: 13px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 8px; }
    .game-selected-title { font-size: 26px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--amber); margin-bottom: 12px; }
    .teams-grid {
      display: grid; grid-template-columns: 1fr 2px 1fr;
      gap: 0; width: 100%; max-width: 800px; flex: 1;
      max-height: 60vh; overflow: hidden;
    }
    .team-col { display: flex; flex-direction: column; padding: 20px 32px; gap: 10px; overflow-y: auto; }
    .team-col-title {
      font-size: 22px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .team-col.col-a .team-col-title { color: var(--team-a); }
    .team-col.col-b .team-col-title { color: var(--team-b); }
    .team-divider { background: rgba(255,255,255,.12); }
    .team-player-item { font-size: 18px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
    .unchosen-hint { color: var(--dim); font-size: 14px; letter-spacing: .08em; text-align: center; }

    /* Compte à rebours */
    #cd-wrap { width: 100%; max-width: 500px; text-align: center; }
    #cd-wrap.hidden { display: none; }
    #cd-num { font-size: 64px; font-weight: 700; color: #4ade80;
      text-shadow: 0 0 30px rgba(74,222,128,.4); line-height: 1; margin-bottom: 12px; }
    #cd-track { height: 8px; background: rgba(255,255,255,.12); border-radius: 99px; overflow: hidden; }
    #cd-fill  { height: 100%; width: 100%; background: #4ade80; border-radius: 99px; }

    /* ── GAME ── */
    #screen-game { gap: 14px; padding: 18px; }
    .scoreboard {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 28px; background: #06100c;
      border: 1px solid rgba(255,210,63,.25); border-radius: 14px;
      padding: 10px 28px;
    }
    .team-name { font-weight: 700; letter-spacing: .28em; font-size: 22px; text-transform: uppercase; }
    .team-name.a { color: var(--team-a); text-align: right; }
    .team-name.b { color: var(--team-b); text-align: left; }
    .score { font-variant-numeric: tabular-nums; font-weight: 700; font-size: 46px;
      letter-spacing: .06em; color: var(--amber);
      text-shadow: 0 0 18px rgba(255,210,63,.35);
      display: flex; align-items: center; gap: 14px; }
    .score .dash { opacity: .45; }
    .pitch-frame { position: relative; flex: 1; width: 100%; max-width: 1100px;
      display: flex; align-items: center; justify-content: center; }
    canvas { width: 100%; height: auto; max-height: 100%; border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,.55); }
    .game-footer { display: flex; align-items: center; gap: 16px; font-size: 13px;
      letter-spacing: .12em; text-transform: uppercase; color: var(--dim); }
    .pill { border: 1px solid rgba(234,255,244,.18); border-radius: 999px;
      padding: 6px 14px; cursor: pointer; transition: border-color .15s, color .15s; }
    .pill:hover { color: var(--ink); border-color: rgba(234,255,244,.4); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #f87171;
      display: inline-block; margin-right: 8px; vertical-align: middle; }
    .dot.on { background: #4ade80; }

    /* QR modal in-game */
    .modal { position: fixed; inset: 0; background: rgba(4,8,6,.82);
      backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 10; }
    .modal.hidden { display: none; }
    .modal-card { background: #0b1512; border: 1px solid rgba(255,210,63,.22);
      border-radius: 18px; padding: 34px 40px; text-align: center; max-width: 460px; }
    .modal-card h2 { font-size: 22px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; margin-bottom: 16px; }
  </style>
</head>
<body>

<!-- ══ LOBBY ══════════════════════════════════════════════════════════════════ -->
<div id="screen-lobby" class="screen">
  <div class="lobby-card">
    <h1>Bienvenue</h1>
    <p>Scanne pour rejoindre la partie</p>
    <div class="qr-box"><img id="qr-img" alt="QR code" /></div>
    <div class="ctrl-url" id="ctrl-url">—</div>
  </div>
</div>

<!-- ══ MENU ═══════════════════════════════════════════════════════════════════ -->
<div id="screen-menu" class="screen hidden">
  <aside class="menu-sidebar">
    <h3>Joueurs connectés</h3>
    <div id="players-list"></div>
  </aside>
  <main class="menu-main">
    <h2>Choisir un jeu</h2>
    <ul class="games-list" id="games-list"></ul>
    <p class="menu-hint" id="menu-hint"></p>
  </main>
</div>

<!-- ══ TEAM SELECT ════════════════════════════════════════════════════════════ -->
<div id="screen-team" class="screen hidden">
  <p class="team-header">Choisir son équipe</p>
  <p class="game-selected-title" id="team-game-title"></p>
  <div class="teams-grid">
    <div class="team-col col-a">
      <div class="team-col-title">Azur</div>
      <div id="team-a-list"></div>
    </div>
    <div class="team-divider"></div>
    <div class="team-col col-b">
      <div class="team-col-title">Mandarine</div>
      <div id="team-b-list"></div>
    </div>
  </div>
  <p class="unchosen-hint" id="unchosen-hint"></p>
  <div id="cd-wrap" class="hidden">
    <div id="cd-num">5</div>
    <div id="cd-track"><div id="cd-fill"></div></div>
  </div>
</div>

<!-- ══ GAME ═══════════════════════════════════════════════════════════════════ -->
<div id="screen-game" class="screen hidden">
  <div class="scoreboard">
    <div class="team-name a">Azur</div>
    <div class="score"><span id="scoreA">0</span><span class="dash">–</span><span id="scoreB">0</span></div>
    <div class="team-name b">Mandarine</div>
  </div>
  <div class="pitch-frame">
    <canvas id="pitch" width="900" height="600"></canvas>
  </div>
  <div class="game-footer">
    <span><span id="statusDot" class="dot"></span><span id="statusText">—</span></span>
    <span class="pill" id="joinPill">Ajouter une manette</span>
  </div>
  <div class="modal hidden" id="join-modal">
    <div class="modal-card">
      <h2>Rejoindre la partie</h2>
      <div class="qr-box"><img id="qr-img2" alt="QR code" /></div>
      <div class="ctrl-url" id="ctrl-url2">—</div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/game.js"></script>
</body>
</html>
